query GenerateMechanismTree($query: String!) {
  generateMechanismTree(query: $query) {
    id
    title
    active_ingredient
    children {
      id
      title
      active_ingredient
      children {
        id
        title
        active_ingredient
        children {
          id
          title
          active_ingredient
        }
      }
    }
  }
}
